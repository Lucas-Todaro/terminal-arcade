<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Arcade</title>
    <link rel="stylesheet" href="rank.css">
</head>

<body>
  <div class="cabecalho">
        <h1>Ranking</h1>
        <div class="bot">
        <a class = 'link' href = 'index.html' target = '_self' rel = 'external'>Voltar</a>
        </div>   
    </div>
    
    <main class="escolhas">
        <h3>Selecione o ranking para visualizar:</h3>
        <div class="listas">
          <div id="ranking"></div>
        </div>
        <div class="botoes">
        <button type="button" onclick="listar('adivinhacao')">Adivinhação</button>
        <button type="button" onclick="listar('pedra')">Pedra papel e tesoura</button>
        <button type="button" onclick="listar('forca')">Jogo da forca</button>
        </div>
    </main>







    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        console.log("SCRIPT RODANDO");
         let supabaseClient = window.supabase.createClient(
  'https://ydwnjfikilpveckcisyg.supabase.co',
  'sb_publishable_UvmjtCDaPcZTdgV_zNUPaQ_Tss2se2r'
);
    async function listar(nome) {
      pos = 0
      let listas = document.querySelector(".listas")
      listas.style.display = "block"
      if (nome == "adivinhacao"){
        document.querySelector("h3").innerHTML = `Ranking da adivinhação:`
      }
      else if (nome == "forca"){
        document.querySelector("h3").innerHTML = `Ranking da forca:`
      }
      else if (nome == "pedra"){
        document.querySelector("h3").innerHTML = `Ranking do pedra papel e tesoura:`
      }
      
  let { data, error } = await supabaseClient
    .from(`ranking_${nome}`)
    .select('*')
    .order('pontos', { ascending: false });

  console.log("DATA:", data);
    console.log("ERROR:", error);
  if (!data) return;

let rank = document.querySelector("#ranking")  
rank.innerHTML = ""
if (data.length <= 0){
  let p = document.createElement("p");
  p.innerHTML = "<strong>Nenhuma pontuação salva!</strong>"
  rank.appendChild(p)
}

  data.forEach(item => {
    pos += 1
    let p = document.createElement("p");
    p.innerHTML = `<strong>${pos}º</strong>: ` + `<strong>${item.nome}</strong>` + " | <strong>" + item.pontos + " pontos</strong>";
    rank.appendChild(p);
  });
  document.querySelector(".botoes").innerHTML = "<button type = 'button' onclick = 'selecao()'>Selecionar outro ranking</button>"

}
function selecao(){
  document.querySelector(".botoes").innerHTML = document.querySelector(".botoes").innerHTML = `
<button type="button" onclick="listar('adivinhacao')">Adivinhação</button>
<button type="button" onclick="listar('pedra')">Pedra papel e tesoura</button>
<button type="button" onclick="listar('forca')">Jogo da forca</button>
`;
rank = document.querySelector("p")
rank.remove()
document.querySelector("h3").innerHTML = `Selecione o ranking para visualizar:`
let listas = document.querySelector(".listas")
listas.style.display = "none"
}
    </script>
</body>
</html>
