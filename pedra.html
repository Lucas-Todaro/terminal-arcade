<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra Papel Tesoura</title>
    <link rel="stylesheet" href="pedra.css">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <div class="cabecalho">
        <h1>Pedra Papel Tesoura</h1>
        <div class="bot">
        <a class = 'link' href = 'jogos.html' target = '_self' rel = 'external'>Voltar</a>
        </div>   
    </div>
    <main>
        <div class="msg">
            <h2>
                Jogue até perder! Você contra o computador...
            </h2>
        </div>
        <div class="t">
            <p>Escolha sua jogada:</p>
            <div class="jogadas">
            <button class="p" type="button" onclick="jogo(0)">Pedra</button>
            <button class="p" type="button" onclick="jogo(1)">Papel</button>
            <button class="p" type="button" onclick="jogo(2)">Tesoura</button>
        </div>
        </div>
        <div class="a">
            <div class="resultado"></div>
            <div class="denovo"></div>
        </div>
        
    </main>
</body>
<script>
let nome = localStorage.getItem("nome"); 
supabase = window.supabase.createClient('https://ydwnjfikilpveckcisyg.supabase.co', 'sb_publishable_UvmjtCDaPcZTdgV_zNUPaQ_Tss2se2r')
    async function salvar(){
          let nome = localStorage.getItem("nome"); 
          let pontos = localStorage.getItem(`pontos_pedra${localStorage.getItem("nome")}`)
  await supabase
    .from('ranking_pedra')
    .upsert([{ nome, pontos }], { onConflict: ['nome'] })
     }
    maior_streak = 0
    streak = 0  
    botoes = document.querySelector(".t")
    function jogo(jogada){
    document.querySelector(".resultado").style.background = "#ece1c3"
    pc = Math.floor(Math.random() * 3)
    jogadas = ["Pedra", "Papel", "Tesoura"]
    jogada_pc = jogadas[pc]
    jogada_player = jogadas[jogada]
    resultado = ""
    if (jogada === pc){
        resultado = "Empate"
        document.querySelector(".resultado").innerHTML = `<p class = "p1">Você: ${jogada_player}      |      CPU: ${jogada_pc}</p><p class = "p2"><br>Resultado: ${resultado}</p><br><p class = "p3">Continue jogando!</p>` 
        document.querySelector(".p2").style.color = "#063940"
        document.querySelector(".p3").style.color = "#063940"   
    }
    else if(jogada === 0 && pc === 2 || jogada === 1 && pc === 0 || jogada === 2 && pc === 1){
        let pontos_pedra = Number(localStorage.getItem(`pontos_pedra${localStorage.getItem("nome")}`)) || 0;
         pontos_pedra += 15
         localStorage.setItem(`pontos_pedra${localStorage.getItem("nome")}`, pontos_pedra)
        streak += 1
        resultado = "Vitória"
        document.querySelector(".resultado").innerHTML = `<p class = "p1">Você: ${jogada_player}      |      CPU: ${jogada_pc}</p><p class = "p2"><br>Resultado: ${resultado}</p><br><p class = "p3">🔥Streak atual: ${streak}🔥</p>`
        document.querySelector(".p2").style.color = "rgb(4, 85, 4)"
        document.querySelector(".p3").style.color = "rgb(4, 85, 4)"
        if (nome){
             document.querySelector(".resultado").innerHTML += "<br><strong>+15 pontos</strong>"
             salvar()
        }
        
    }
    else{
        if (streak > maior_streak){
            maior_streak = streak
        }
        resultado = "Derrota"
        botoes.style.display = 'none'
        document.querySelector(".resultado").innerHTML = `<p class = "p1">Você: ${jogada_player}      |      CPU: ${jogada_pc}</p><p class = "p2"><br>Resultado: ${resultado}</p><br><p class = "p3">Fim de jogo!<br> Maior streak: ${maior_streak}🔥</p>`
        document.querySelector(".resultado").style.background = "#E6A4A4"
        document.querySelector(".denovo").innerHTML = "Quer tentar aumentar seu recorde? <button class = 'back' type = 'button ' onclick = 'denovo()'> Jogar de novo </button>"
        document.querySelector(".p2").style.color = "rgb(107, 7, 7)"
        document.querySelector(".p3").style.color = "#063940"
    }
    
    }
  function denovo(){
    botoes.style.display = "block"
    document.querySelector(".denovo").innerHTML = ""
    document.querySelector(".resultado").innerHTML = ""
    streak = 0
  } 
</script>
</html>
