<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilo_login.css">
</head>
<body>
    <div class="cabecalho">
        <h1>LOGIN ARCADE</h1>
        <div class="bot">
        <a class = 'link' href = 'index.html' target = '_self' rel = 'external'>Voltar</a>
        </div>   
    </div>
    <main>
        <div class="container">
            <p>Login Arcade</p>
            <div class="botoes">
            <input type="text" placeholder="Usuário" id="nome">
            <button onclick="enviar()" >Enviar</button>
            </div> 
        </div>
    </main>
</body>
<script>
    function enviar(){
    nome = document.querySelector("input#nome").value
    localStorage.setItem("nome", nome)
    document.querySelector("#nome").value = ""
    window.location.href = 'index.html'
    
}
</script>
</html>
